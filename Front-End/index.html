<!doctype html>
<html lang="id">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>ProLead Properti - Frontend</title>
    <style>
      :root { --bg:#0f172a; --muted:#94a3b8; --card:#111827; --border:#1f2937; --accent:#22d3ee; --text:#e5e7eb; }
      * { box-sizing: border-box; }
      body { margin: 0; font-family: system-ui, -apple-system, Segoe UI, Roboto, Ubuntu, Cantarell, Noto Sans, Arial; background: linear-gradient(120deg, #0b1020, #0f172a 40%, #0b1020 100%); color: var(--text); }
      header { position: sticky; top: 0; z-index: 10; backdrop-filter: blur(8px); background: rgba(2,6,23,0.6); border-bottom: 1px solid var(--border); }
      .container { max-width: 1100px; margin: 0 auto; padding: 16px; }
      .brand { font-weight: 700; letter-spacing: .3px; }
      .muted { color: var(--muted); }
      .grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(260px, 1fr)); gap: 16px; }
      .card { background: linear-gradient(180deg, #0b1220, #0b1324); border: 1px solid var(--border); border-radius: 12px; overflow: hidden; box-shadow: 0 6px 18px rgba(0,0,0,.35); transition: transform .15s ease, box-shadow .15s ease; }
      .card:hover { transform: translateY(-2px); box-shadow: 0 10px 24px rgba(0,0,0,.45); }
      .card img { width: 100%; height: 160px; object-fit: cover; display: block; }
      .card-body { padding: 12px 14px 16px; }
      h3 { margin: 0 0 6px; font-size: 16px; }
      .price { margin: 0 0 6px; color: var(--accent); font-weight: 700; }
      .meta { margin: 0 0 12px; color: var(--muted); font-size: 13px; }
      .btn { display: inline-block; text-decoration: none; background: var(--accent); color: #08151a; font-weight: 700; padding: 8px 12px; border-radius: 8px; transition: opacity .15s ease; }
      .btn:hover { opacity: .9; }
      footer { border-top: 1px solid var(--border); margin-top: 24px; }
      .tag { display:inline-block; font-size:12px; padding:4px 8px; border:1px solid var(--border); border-radius:999px; margin-right:8px; }
      .toolbar { display:flex; flex-wrap:wrap; gap:8px; margin:12px 0 20px; }
      input[type="search"] { width: 100%; max-width: 420px; padding: 10px 12px; border-radius: 10px; border: 1px solid var(--border); background: #0b1324; color: var(--text); }
    </style>
  </head>
  <body>
    <header>
      <div class="container" style="display:flex; align-items:center; justify-content:space-between; gap:12px;">
        <div class="brand">ProLead Properti</div>
        <div class="muted">Frontend statis memanggil Backend API</div>
      </div>
    </header>
    <main class="container">
      <div class="toolbar">
        <span class="tag">Semua</span>
        <span class="tag">Rumah</span>
        <span class="tag">Cluster</span>
        <span class="tag">Villa</span>
        <input id="q" type="search" placeholder="Cari lokasi / judul..." />
      </div>
      <section class="grid" id="grid"></section>
    </main>
    <footer>
      <div class="container muted">© <span id="year"></span> ProLead. Data dummy untuk demo.</div>
    </footer>
    <script>
      const API_BASE = 'http://localhost:3000';
      const grid = document.getElementById('grid');
      const q = document.getElementById('q');
      const toCurrency = (n) => new Intl.NumberFormat('id-ID', { style: 'currency', currency: 'IDR', maximumFractionDigits: 0 }).format(n);

      function render(houses) {
        grid.innerHTML = houses.map(h => `
          <article class="card">
            <img src="https://picsum.photos/seed/house${h.id}/640/400" alt="${h.title}" loading="lazy" />
            <div class="card-body">
              <h3>${h.title}</h3>
              <p class="price">${toCurrency(h.price)}</p>
              <p class="meta">${h.location} · ${h.beds} KT · ${h.baths} KM · ${h.area} m²</p>
              <a class="btn" href="#" aria-label="Lihat detail ${h.title}">Lihat Detail</a>
            </div>
          </article>
        `).join('');
      }

      async function load() {
        try {
          const res = await fetch(`${API_BASE}/api/houses`);
          const data = await res.json();
          window.__ALL__ = data;
          render(data);
        } catch (e) {
          grid.innerHTML = '<div class="muted">Gagal memuat data. Pastikan backend berjalan.</div>';
        }
      }

      q.addEventListener('input', () => {
        const term = q.value.toLowerCase();
        const src = window.__ALL__ || [];
        const filtered = src.filter(h => `${h.title} ${h.location} ${h.beds} ${h.baths} ${h.area}`.toLowerCase().includes(term));
        render(filtered);
      });

      document.getElementById('year').textContent = new Date().getFullYear();
      load();
    </script>
  </body>
</html>
